<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Finanças">
    <title>Painel Vanderly</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-color: #F2F2F7; --card-bg: #FFFFFF; --text-primary: #000000;
            --text-secondary: #8E8E93; --accent-color: #007AFF; --up-color: #34C759;
            --up-bg: rgba(52, 199, 89, 0.15); --down-color: #FF3B30;
            --down-bg: rgba(255, 59, 48, 0.15); --shadow: 0 4px 12px rgba(0,0,0,0.05);
            --border-soft: rgba(128,128,128,0.12);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000; --card-bg: #1C1C1E; --text-primary: #FFFFFF;
                --text-secondary: #98989D; --shadow: 0 4px 12px rgba(0,0,0,0.3);
            }
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color); color: var(--text-primary);
            margin: 0; padding: 0; padding-bottom: 80px; -webkit-user-select: none;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        #lock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color); z-index: 9999; display: flex;
            flex-direction: column; justify-content: center; align-items: center; padding: 20px;
        }
        .lock-content { text-align: center; width: 100%; max-width: 300px; }
        .lock-input {
            width: 100%; padding: 15px; margin: 20px 0; border-radius: 12px;
            border: 1px solid var(--text-secondary); font-size: 18px; text-align: center;
            background: var(--card-bg); color: var(--text-primary); -webkit-appearance: none; box-sizing: border-box;
        }
        .lock-btn {
            background-color: var(--accent-color); color: white; border: none;
            padding: 15px 40px; border-radius: 12px; font-size: 18px; font-weight: 600; width: 100%;
        }
        .hidden { display: none !important; }
        header {
            padding-top: max(20px, env(safe-area-inset-top)); padding-bottom: 15px;
            padding-left: 20px; padding-right: 20px; background: var(--bg-color);
            display: flex; align-items: center; justify-content: space-between;
        }
        .header-profile { display: flex; align-items: center; gap: 12px; }
        .app-icon {
            width: 44px; height: 44px; background: var(--accent-color); border-radius: 12px;
            display: flex; align-items: center; justify-content: center; color: white;
            font-size: 20px; box-shadow: 0 4px 10px rgba(0,122,255,0.3);
        }
        .user-info h1 { font-size: 20px; font-weight: 800; margin: 0; line-height: 1.1; }
        .user-info p { font-size: 12px; color: var(--text-secondary); margin: 0; text-transform: uppercase; }
        .wallet-total { font-size: 15px; font-weight: 700; color: var(--text-primary); margin-top: 2px; }
        .wallet-pl { font-size: 12px; font-weight: 600; margin-top: 1px; }
        .header-actions { display: flex; gap: 15px; }
        .icon-btn { font-size: 20px; color: var(--accent-color); cursor: pointer; padding: 5px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px 20px; }
        .card {
            background-color: var(--card-bg); border-radius: 18px; padding: 16px;
            box-shadow: var(--shadow); display: flex; flex-direction: column;
            justify-content: space-between; min-height: 120px; transition: transform 0.2s; cursor: pointer;
        }
        .card:active { transform: scale(0.96); }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .ticker { font-size: 14px; font-weight: 700; color: var(--text-secondary); }
        .badge { font-size: 11px; font-weight: 700; padding: 4px 6px; border-radius: 6px; }
        .up { color: var(--up-color); background-color: var(--up-bg); }
        .down { color: var(--down-color); background-color: var(--down-bg); }
        .price-container { margin-top: 8px; }
        .price { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; word-wrap: break-word; }
        .price-secondary { color: var(--text-secondary); font-size: 0.85em; }
        .name { font-size: 10px; color: var(--text-secondary); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .holding-info {
            font-size: 10px; color: var(--text-secondary); margin-top: 6px;
            padding-top: 6px; border-top: 1px solid var(--border-soft); display: flex; justify-content: space-between;
        }
        .holding-value { font-weight: 700; color: var(--text-primary); }
        .pl-line { font-size: 10px; font-weight: 700; margin-top: 3px; text-align: right; }
        .sparkline { width: 100%; height: 25px; margin-top: 8px; opacity: 0.85; }
        .sparkline-empty { height: 25px; margin-top: 8px; font-size: 9px; color: var(--text-secondary); display: flex; align-items: center; }
        .news-ticker {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 60px;
            background: rgba(29, 29, 31, 0.95); backdrop-filter: blur(20px); border-top: 0.5px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; overflow: hidden; z-index: 100; padding-bottom: env(safe-area-inset-bottom);
        }
        .ticker-wrap { width: 100%; overflow: hidden; white-space: nowrap; }
        .ticker-move { display: inline-block; animation: ticker 60s linear infinite; }
        .ticker-item { display: inline-block; padding: 0 30px; font-size: 14px; color: white; }
        .ticker-source { font-weight: bold; color: #0A84FF; }
        @keyframes ticker { 0% { transform: translate3d(100%, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }
        #portfolio-modal, #detail-view {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color); z-index: 6000; display: flex; flex-direction: column;
            transform: translateY(100%); transition: transform 0.3s ease-in-out; padding-top: max(20px, env(safe-area-inset-top));
        }
        #portfolio-modal.active, #detail-view.active { transform: translateY(0); }
        .modal-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .modal-title { font-size: 22px; font-weight: 800; }
        .portfolio-list { flex: 1; overflow-y: auto; padding: 0 20px 40px 20px; }
        .settings-box { background: var(--card-bg); border-radius: 14px; padding: 16px; margin-bottom: 16px; box-shadow: var(--shadow); }
        .settings-box h3 { margin: 0 0 10px 0; font-size: 13px; text-transform: uppercase; color: var(--text-secondary); letter-spacing: 0.5px; }
        .settings-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
        .settings-row label { font-size: 12px; color: var(--text-secondary); }
        .settings-input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border-soft); font-size: 14px; background: var(--bg-color); color: var(--text-primary); box-sizing: border-box; }
        .portfolio-item { background: var(--card-bg); padding: 14px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow); }
        .portfolio-item .p-fields { display: flex; gap: 8px; }
        .p-field { display: flex; flex-direction: column; align-items: flex-end; }
        .p-field span { font-size: 9px; color: var(--text-secondary); margin-bottom: 2px; }
        .p-input { width: 78px; padding: 8px; border-radius: 8px; border: 1px solid var(--border-soft); font-size: 15px; background: var(--bg-color); color: var(--text-primary); text-align: right; box-sizing: border-box; }
        .detail-header { padding: 20px; display: flex; align-items: center; justify-content: space-between; }
        .close-btn { background: rgba(128,128,128,0.2); border: none; width: 32px; height: 32px; border-radius: 50%; color: var(--text-primary); font-size: 16px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .detail-info { text-align: center; }
        .detail-price { font-size: 32px; font-weight: 800; margin: 5px 0; }
        .detail-ticker { color: var(--text-secondary); font-weight: 600; text-transform: uppercase; }
        .chart-controls { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; padding: 0 20px; }
        .period-btn { background: var(--card-bg); border: 1px solid var(--border-soft); padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; color: var(--text-primary); transition: all 0.2s; }
        .period-btn.active { background: var(--accent-color); color: white; border-color: var(--accent-color); }
        .chart-container { flex: 1; padding: 10px; position: relative; background: var(--card-bg); border-radius: 24px 24px 0 0; box-shadow: 0 -4px 20px rgba(0,0,0,0.05); margin-top: 10px; }
        #chart-loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--text-secondary); font-size: 13px; text-align: center; width: 80%; }
    </style>
</head>
<body>
    <div id="lock-screen">
        <div class="lock-content">
            <div style="font-size: 40px; margin-bottom: 20px;">🔒</div>
            <h1>Bem-vindo, Vanderly</h1>
            <p class="subtitle">Digite sua senha</p>
            <input type="password" id="user-password" class="lock-input" placeholder="Senha" inputmode="numeric">
            <button onclick="checkPassword()" class="lock-btn">Acessar</button>
            <p id="error-msg" style="color: red; font-size: 12px; margin-top: 10px; display: none;">Senha incorreta</p>
        </div>
    </div>

    <div id="app-content" class="hidden">
        <header>
            <div class="header-profile">
                <div class="app-icon"><i class="fa-solid fa-chart-pie"></i></div>
                <div class="user-info">
                    <h1>Vanderly</h1>
                    <div class="wallet-total" id="grand-total">R$ 0,00</div>
                    <div class="wallet-pl" id="grand-pl"></div>
                    <p id="last-update">Atualizando...</p>
                </div>
            </div>
            <div class="header-actions">
                <div class="icon-btn" onclick="openPortfolio()"><i class="fa-solid fa-wallet"></i></div>
                <div class="icon-btn" onclick="fetchData()"><i class="fa-solid fa-rotate-right"></i></div>
            </div>
        </header>
        <div class="grid" id="cards-container"></div>
        <div class="news-ticker"><div class="ticker-wrap"><div class="ticker-move" id="news-content"></div></div></div>
    </div>

    <div id="portfolio-modal">
        <div class="modal-header">
            <button class="close-btn" style="width:auto; padding:0 15px; border-radius:15px;" onclick="closePortfolio()">Voltar</button>
            <div class="modal-title">Carteira</div>
            <button class="close-btn" style="color: var(--accent-color); background: transparent; font-weight: bold; width: auto;" onclick="savePortfolio()">Salvar</button>
        </div>
        <div class="portfolio-list" id="portfolio-inputs"></div>
    </div>

    <div id="detail-view">
        <div class="detail-header">
            <button class="close-btn" onclick="closeDetail()"><i class="fa-solid fa-xmark"></i></button>
            <div class="detail-info">
                <div class="detail-ticker" id="detail-ticker">TICKER</div>
                <div style="font-size: 12px; opacity: 0.7;" id="detail-name">Nome</div>
            </div>
            <div style="width: 32px;"></div>
        </div>
        <div style="text-align: center; margin-bottom: 20px;">
            <div class="detail-price" id="detail-price">R$ 0,00</div>
            <div id="detail-change" style="font-weight: 600; font-size: 16px;">0.00%</div>
        </div>
        <div class="chart-controls">
            <button class="period-btn active" data-period="1d" onclick="changePeriod(this,'1d')">1D</button>
            <button class="period-btn" data-period="5d" onclick="changePeriod(this,'5d')">5D</button>
            <button class="period-btn" data-period="1mo" onclick="changePeriod(this,'1mo')">1M</button>
            <button class="period-btn" data-period="1y" onclick="changePeriod(this,'1y')">1A</button>
        </div>
        <div class="chart-container">
            <canvas id="assetChart"></canvas>
            <div id="chart-loading">Carregando...</div>
        </div>
    </div>

  <script>
        /* ===================================================================
           CONFIGURAÇÃO
           -------------------------------------------------------------------
           SENHA: não fica mais em texto puro. Guardamos apenas o hash SHA-256.
           O hash abaixo corresponde à senha padrão "1234". Você pode trocar a
           senha dentro do app (Carteira > Ajustes) sem editar este arquivo.

           TOKEN BRAPI: o ideal seria mantê-lo num backend (a própria brapi
           recomenda não expor no frontend). Como este app é single-file, o
           token fica configurável em Ajustes e guardado localmente no aparelho.
           O valor abaixo é só um fallback inicial.
        =================================================================== */
        const DEFAULT_PWD_HASH = '03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4'; // "1234"
        const DEFAULT_BRAPI_TOKEN = '4cC5ecuq416RSfKLHm3aRX';
        const LOGIN_VALIDITY_DAYS = 7;

        // Armazenamento resiliente: usa localStorage quando disponível,
        // cai para memória se estiver bloqueado (ex.: preview/sandbox).
        const memStore = {};
        const store = {
            get(k) { try { return localStorage.getItem(k); } catch (e) { return (k in memStore) ? memStore[k] : null; } },
            set(k, v) { try { localStorage.setItem(k, v); } catch (e) { memStore[k] = v; } },
            del(k) { try { localStorage.removeItem(k); } catch (e) { delete memStore[k]; } }
        };

        const assets = [
            { id: 'USD', type: 'currency', name: 'Dólar Comercial' },
            { id: 'BTC', type: 'crypto', name: 'Bitcoin' },
            { id: 'IBOV', type: 'index', name: 'Ibovespa' },
            { id: 'BBAS3', type: 'stock', name: 'Banco do Brasil' },
            { id: 'BBDC3', type: 'stock', name: 'Bradesco ON' },
            { id: 'JBSS3', type: 'stock', name: 'JBS S.A.' },
            { id: 'SBSP3', type: 'stock', name: 'Sabesp' },
            { id: 'WEGE3', type: 'stock', name: 'WEG S.A.' }
        ];

        const news = [
            { source: 'InfoMoney', title: 'Acompanhe as movimentações do mercado' },
            { source: 'CoinDesk', title: 'Bitcoin segue em foco pelos investidores' },
            { source: 'Valor', title: 'Dólar e juros são destaque na sessão' },
            { source: 'B3', title: 'Veja os destaques da bolsa brasileira hoje' }
        ];

        let currentDetailAsset = null;
        let currentDetailData = null;
        let myChart = null;
        let portfolio = {};          // { id: { qty, avg } }  (avg em R$)
        let priceCache = {};         // { id: priceBRL }
        const historyCache = {};     // { id: [closes...] } para sparkline (período 1M)

        function getToken() { return store.get('brapi_token') || DEFAULT_BRAPI_TOKEN; }
        function getPwdHash() { return store.get('pwd_hash') || DEFAULT_PWD_HASH; }

        async function sha256(text) {
            const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
            return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function checkPassword() {
            const val = document.getElementById('user-password').value;
            const hash = await sha256(val);
            if (hash === getPwdHash()) {
                const expires = Date.now() + LOGIN_VALIDITY_DAYS * 86400000;
                store.set('login_expires', String(expires));
                unlockApp();
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        function unlockApp() {
            document.getElementById('lock-screen').classList.add('hidden');
            document.getElementById('app-content').classList.remove('hidden');
            loadPortfolio();
            initApp();
        }

        window.onload = function () {
            const exp = parseInt(store.get('login_expires') || '0', 10);
            if (exp && Date.now() < exp) unlockApp();
            document.getElementById('user-password').addEventListener('keydown', function (e) {
                if (e.key === 'Enter') checkPassword();
            });
        };

        // Migração: formato antigo era { id: numeroQtd }. Novo: { id: {qty, avg} }.
        function loadPortfolio() {
            const saved = store.get('user_portfolio');
            portfolio = {};
            if (!saved) return;
            try {
                const data = JSON.parse(saved);
                Object.keys(data).forEach(id => {
                    const v = data[id];
                    if (typeof v === 'number') portfolio[id] = { qty: v, avg: 0 };
                    else if (v && typeof v === 'object') portfolio[id] = { qty: v.qty || 0, avg: v.avg || 0 };
                });
            } catch (e) { console.error('Carteira inválida:', e); }
        }

        function openPortfolio() {
            const list = document.getElementById('portfolio-inputs');
            list.innerHTML = '';

            // Caixa de ajustes (token + troca de senha)
            const settings = document.createElement('div');
            settings.className = 'settings-box';
            settings.innerHTML = `
                <h3>Ajustes</h3>
                <div class="settings-row">
                    <label>Token brapi (opcional — fica salvo só neste aparelho)</label>
                    <input type="text" class="settings-input" id="cfg-token" placeholder="Deixe vazio p/ usar o padrão" value="${store.get('brapi_token') || ''}">
                </div>
                <div class="settings-row">
                    <label>Nova senha (deixe vazio para manter a atual)</label>
                    <input type="password" class="settings-input" id="cfg-pwd" placeholder="••••" inputmode="numeric">
                </div>
            `;
            list.appendChild(settings);

            assets.forEach(asset => {
                if (asset.id === 'IBOV') return;
                const p = portfolio[asset.id] || { qty: 0, avg: 0 };
                const moeda = (asset.id === 'BTC') ? 'PM R$' : 'PM R$';
                const item = document.createElement('div');
                item.className = 'portfolio-item';
                item.innerHTML = `
                    <div>
                        <div style="font-weight:700;">${asset.id}</div>
                        <div style="font-size:12px; color:var(--text-secondary);">${asset.name}</div>
                    </div>
                    <div class="p-fields">
                        <div class="p-field">
                            <span>QTD</span>
                            <input type="number" class="p-input" id="qty-${asset.id}" value="${p.qty || ''}" step="any" placeholder="0">
                        </div>
                        <div class="p-field">
                            <span>${moeda}</span>
                            <input type="number" class="p-input" id="avg-${asset.id}" value="${p.avg || ''}" step="any" placeholder="0,00">
                        </div>
                    </div>
                `;
                list.appendChild(item);
            });
            document.getElementById('portfolio-modal').classList.add('active');
        }

        function closePortfolio() { document.getElementById('portfolio-modal').classList.remove('active'); }

        async function savePortfolio() {
            // Token
            const tokenInput = document.getElementById('cfg-token');
            if (tokenInput) {
                const t = tokenInput.value.trim();
                if (t) store.set('brapi_token', t); else store.del('brapi_token');
            }
            // Senha
            const pwdInput = document.getElementById('cfg-pwd');
            if (pwdInput && pwdInput.value.trim()) {
                store.set('pwd_hash', await sha256(pwdInput.value.trim()));
            }
            // Carteira
            assets.forEach(asset => {
                if (asset.id === 'IBOV') return;
                const qEl = document.getElementById(`qty-${asset.id}`);
                const aEl = document.getElementById(`avg-${asset.id}`);
                if (!qEl) return;
                const qty = parseFloat(qEl.value);
                const avg = parseFloat(aEl.value);
                if (!isNaN(qty) && qty > 0) {
                    portfolio[asset.id] = { qty: qty, avg: (!isNaN(avg) && avg > 0) ? avg : 0 };
                } else {
                    delete portfolio[asset.id];
                }
            });
            store.set('user_portfolio', JSON.stringify(portfolio));
            closePortfolio();
            fetchData();
        }

        function initApp() {
            renderSkeleton();
            renderNews();
            fetchData();
            setInterval(fetchData, 300000); // 5 min (1 req multi-ticker por ciclo)
        }

        function renderSkeleton() {
            const container = document.getElementById('cards-container');
            container.innerHTML = '';
            assets.forEach(asset => { container.innerHTML += createCardHTML(asset, null, true); });
        }

        function renderNews() {
            const newsContainer = document.getElementById('news-content');
            let html = '';
            news.forEach(n => { html += `<div class="ticker-item"><span class="ticker-source">${n.source}:</span> ${n.title}</div>`; });
            newsContainer.innerHTML = html + html + html + html;
        }

        // ---------- FETCH ----------
        async function fetchData() {
            const updateLabel = document.getElementById('last-update');
            updateLabel.innerText = "Atualizando...";

            let coinsData = null;
            const stockMap = {};

            // 1. Moedas/cripto — cotação atual (AwesomeAPI)
            try {
                const r = await fetch('https://economia.awesomeapi.com.br/last/USD-BRL,BTC-BRL,BTC-USD');
                if (r.ok) coinsData = await r.json();
            } catch (e) { console.error("Erro moedas:", e); }

            // 1b. Histórico diário p/ sparkline das moedas (30 dias)
            try {
                const [usdH, btcH] = await Promise.all([
                    fetch('https://economia.awesomeapi.com.br/json/daily/USD-BRL/30').then(r => r.ok ? r.json() : []),
                    fetch('https://economia.awesomeapi.com.br/json/daily/BTC-USD/30').then(r => r.ok ? r.json() : [])
                ]);
                if (Array.isArray(usdH) && usdH.length) historyCache['USD'] = usdH.map(d => parseFloat(d.bid)).reverse();
                if (Array.isArray(btcH) && btcH.length) historyCache['BTC'] = btcH.map(d => parseFloat(d.bid)).reverse();
            } catch (e) { console.error("Erro histórico moedas:", e); }

            // 2. Ações + índice — UMA chamada multi-ticker já trazendo histórico de 1 mês
            try {
                const tickers = assets
                    .filter(a => a.type === 'stock' || a.type === 'index')
                    .map(a => a.id === 'IBOV' ? '^BVSP' : a.id)
                    .join(',');
                const url = `https://brapi.dev/api/quote/${encodeURIComponent(tickers)}?range=1mo&interval=1d&token=${getToken()}`;
                const r = await fetch(url);
                if (r.ok) {
                    const dados = await r.json();
                    if (dados.results) {
                        dados.results.forEach(res => {
                            const id = (res.symbol === '^BVSP') ? 'IBOV' : res.symbol;
                            stockMap[id] = res;
                            if (Array.isArray(res.historicalDataPrice) && res.historicalDataPrice.length) {
                                historyCache[id] = res.historicalDataPrice.map(p => p.close).filter(v => v != null);
                            }
                        });
                    }
                } else {
                    console.error("brapi respondeu", r.status);
                }
            } catch (e) { console.error("Erro ações:", e); }

            renderCards(coinsData, stockMap);

            const now = new Date();
            updateLabel.innerText = "Atualizado às " + now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        }

        function renderCards(coinsData, stockMap) {
            const container = document.getElementById('cards-container');
            container.innerHTML = '';
            priceCache = {};

            let totalAtual = 0, totalCusto = 0;

            assets.forEach(asset => {
                let data = null;
                let priceBRL = 0;

                if (coinsData) {
                    if (asset.id === 'USD' && coinsData.USDBRL) {
                        priceBRL = parseFloat(coinsData.USDBRL.bid);
                        data = { price: priceBRL, change: parseFloat(coinsData.USDBRL.pctChange), symbol: 'R$' };
                    } else if (asset.id === 'BTC' && coinsData.BTCUSD && coinsData.BTCBRL) {
                        priceBRL = parseFloat(coinsData.BTCBRL.bid);
                        const valUsd = parseFloat(coinsData.BTCUSD.bid).toLocaleString('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 0 });
                        const valBrl = priceBRL.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL', minimumFractionDigits: 0 });
                        data = {
                            displayValue: `<span style="font-size: 0.9em">${valUsd}</span> <span class="price-secondary">/ ${valBrl}</span>`,
                            change: parseFloat(coinsData.BTCUSD.pctChange), symbol: '', price: parseFloat(coinsData.BTCUSD.bid)
                        };
                    }
                }

                if (asset.type === 'stock' || asset.type === 'index') {
                    const s = stockMap[asset.id];
                    if (s && s.regularMarketPrice != null) {
                        priceBRL = s.regularMarketPrice;
                        data = { price: priceBRL, change: s.regularMarketChangePercent || 0, symbol: 'R$' };
                    }
                }

                priceCache[asset.id] = priceBRL;

                const p = portfolio[asset.id] || { qty: 0, avg: 0 };
                const valor = p.qty * priceBRL;
                const custo = p.qty * p.avg;
                if (asset.id !== 'IBOV' && data && p.qty > 0) {
                    totalAtual += valor;
                    if (p.avg > 0) totalCusto += custo;
                    else totalCusto += valor; // sem PM, não conta como ganho/perda
                }

                const cardDiv = document.createElement('div');
                cardDiv.innerHTML = createCardHTML(asset, data, false, p, valor);
                if (data) cardDiv.firstElementChild.onclick = () => openDetail(asset, data);
                container.appendChild(cardDiv);
            });

            // Totais
            document.getElementById('grand-total').innerText = totalAtual.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            const plEl = document.getElementById('grand-pl');
            const lucro = totalAtual - totalCusto;
            if (totalCusto > 0 && Math.abs(lucro) > 0.005) {
                const pct = (lucro / totalCusto) * 100;
                const up = lucro >= 0;
                plEl.style.color = up ? 'var(--up-color)' : 'var(--down-color)';
                plEl.innerText = `${up ? '+' : ''}${lucro.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })} (${up ? '+' : ''}${pct.toFixed(2)}%)`;
            } else {
                plEl.innerText = '';
            }
        }

        function buildSparkline(id, isUp) {
            const series = historyCache[id];
            if (!series || series.length < 2) {
                return `<div class="sparkline-empty">Histórico indisponível</div>`;
            }
            const color = isUp ? '#34C759' : '#FF3B30';
            const min = Math.min(...series), max = Math.max(...series);
            const range = (max - min) || 1;
            const n = series.length;
            let path = '';
            series.forEach((v, i) => {
                const x = (i / (n - 1)) * 100;
                const y = 28 - ((v - min) / range) * 26; // margem de 2px topo/baixo
                path += (i === 0 ? `M ${x.toFixed(2)} ${y.toFixed(2)} ` : `L ${x.toFixed(2)} ${y.toFixed(2)} `);
            });
            return `<svg class="sparkline" viewBox="0 0 100 30" preserveAspectRatio="none"><path d="${path}" stroke="${color}" stroke-width="2" fill="none" vector-effect="non-scaling-stroke" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
        }

        function createCardHTML(asset, data, loading = false, holding = { qty: 0, avg: 0 }, valor = 0) {
            if (loading) return `<div class="card"><div class="card-header"><span class="ticker">${asset.id}</span></div><div class="price-container"><div class="price" style="opacity:0.3">---</div></div></div>`;
            if (!data) return `<div class="card"><div class="card-header"><span class="ticker">${asset.id}</span></div><div class="name" style="color:var(--down-color);">Sem dados</div></div>`;

            const isUp = data.change >= 0;
            const badgeClass = isUp ? 'up' : 'down';
            const sign = isUp ? '+' : '';

            const priceHtml = data.displayValue ? data.displayValue : `${data.symbol} ${data.price.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
            const tickerName = asset.id === 'BTC' ? 'BTC (Global)' : asset.id;

            const sparkline = buildSparkline(asset.id, isUp);

            let holdingHtml = '';
            if (holding.qty > 0) {
                holdingHtml = `
                <div class="holding-info">
                    <div>Qtd: ${holding.qty}</div>
                    <div class="holding-value">R$ ${valor.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</div>
                </div>`;
                if (holding.avg > 0) {
                    const custo = holding.qty * holding.avg;
                    const lucro = valor - custo;
                    const pct = custo > 0 ? (lucro / custo) * 100 : 0;
                    const up = lucro >= 0;
                    holdingHtml += `<div class="pl-line" style="color:${up ? 'var(--up-color)' : 'var(--down-color)'}">${up ? '+' : ''}R$ ${lucro.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })} (${up ? '+' : ''}${pct.toFixed(2)}%)</div>`;
                }
            }

            return `
            <div class="card">
                <div>
                    <div class="card-header">
                        <span class="ticker">${tickerName}</span>
                        <span class="badge ${badgeClass}">${sign}${data.change.toFixed(2)}%</span>
                    </div>
                    <div class="price-container">
                        <div class="price">${priceHtml}</div>
                        <div class="name">${asset.name}</div>
                    </div>
                </div>
                <div>
                    ${sparkline}
                    ${holdingHtml}
                </div>
            </div>`;
        }

        // ---------- DETALHE + GRÁFICO ----------
        function openDetail(asset, currentData) {
            currentDetailAsset = asset;
            currentDetailData = currentData;
            document.getElementById('detail-view').classList.add('active');
            document.getElementById('detail-ticker').innerText = asset.id;
            document.getElementById('detail-name').innerText = asset.name;

            let displayPrice = currentData.price.toLocaleString('pt-BR', { style: 'currency', currency: asset.id === 'BTC' ? 'USD' : 'BRL' });
            if (asset.id === 'BTC') displayPrice = displayPrice.replace('US$', 'USD ');
            document.getElementById('detail-price').innerText = displayPrice;

            const isUp = currentData.change >= 0;
            const changeElem = document.getElementById('detail-change');
            changeElem.innerText = `${isUp ? '+' : ''}${currentData.change.toFixed(2)}%`;
            changeElem.style.color = isUp ? 'var(--up-color)' : 'var(--down-color)';

            const btns = document.querySelectorAll('.period-btn');
            btns.forEach(b => b.classList.remove('active'));
            // Câmbio/cripto: 1D intradiário não vem desta fonte; abre em 1M.
            const startPeriod = (asset.type === 'currency' || asset.type === 'crypto') ? '1mo' : '1d';
            const startBtn = Array.from(btns).find(b => b.dataset.period === startPeriod) || btns[0];
            startBtn.classList.add('active');
            loadChart(startPeriod);
        }

        function closeDetail() { document.getElementById('detail-view').classList.remove('active'); }

        function changePeriod(btn, period) {
            document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            loadChart(period);
        }

        async function loadChart(range) {
            const loader = document.getElementById('chart-loading');
            if (myChart) { myChart.destroy(); myChart = null; }
            loader.style.display = 'block';
            loader.innerText = "Carregando...";

            const asset = currentDetailAsset;
            let points = null; // [{t: label, v: valor}]

            try {
                if (asset.type === 'stock' || asset.type === 'index') {
                    points = await fetchStockSeries(asset, range);
                } else {
                    points = await fetchCoinSeries(asset, range);
                }
            } catch (e) {
                console.error("Erro ao carregar gráfico:", e);
            }

            if (!points || points.length < 2) {
                loader.style.display = 'block';
                loader.innerText = (asset.type === 'currency' || asset.type === 'crypto') && range === '1d'
                    ? "Intradiário indisponível para câmbio/cripto. Use 5D ou mais."
                    : "Histórico indisponível para este período.";
                return;
            }

            loader.style.display = 'none';
            drawChart(points, currentDetailData.change >= 0, asset);
        }

        async function fetchStockSeries(asset, range) {
            const ticker = asset.id === 'IBOV' ? '^BVSP' : asset.id;
            const intervalMap = { '1d': '15m', '5d': '60m', '1mo': '1d', '1y': '1d' };
            const interval = intervalMap[range] || '1d';
            const url = `https://brapi.dev/api/quote/${encodeURIComponent(ticker)}?range=${range}&interval=${interval}&token=${getToken()}`;
            const r = await fetch(url);
            if (!r.ok) return null;
            const dados = await r.json();
            const hist = dados.results && dados.results[0] && dados.results[0].historicalDataPrice;
            if (!Array.isArray(hist)) return null;
            return hist
                .filter(p => p.close != null)
                .map(p => ({ t: formatLabel(p.date * 1000, range), v: p.close }));
        }

        async function fetchCoinSeries(asset, range) {
            // AwesomeAPI: histórico diário. 1D não tem intradiário aqui.
            const pair = asset.id === 'USD' ? 'USD-BRL' : 'BTC-USD';
            const daysMap = { '1d': 0, '5d': 5, '1mo': 30, '1y': 360 };
            const days = daysMap[range];
            if (!days) return null;
            const r = await fetch(`https://economia.awesomeapi.com.br/json/daily/${pair}/${days}`);
            if (!r.ok) return null;
            const arr = await r.json();
            if (!Array.isArray(arr)) return null;
            return arr
                .map(d => ({ t: formatLabel(parseInt(d.timestamp, 10) * 1000, range), v: parseFloat(d.bid) }))
                .reverse();
        }

        function formatLabel(ms, range) {
            const d = new Date(ms);
            if (range === '1d') return d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
        }

        function drawChart(points, isUp, asset) {
            const ctx = document.getElementById('assetChart').getContext('2d');
            const color = isUp ? '#34C759' : '#FF3B30';
            const labels = points.map(p => p.t);
            const values = points.map(p => p.v);

            const grad = ctx.createLinearGradient(0, 0, 0, 320);
            grad.addColorStop(0, isUp ? 'rgba(52,199,89,0.25)' : 'rgba(255,59,48,0.25)');
            grad.addColorStop(1, 'rgba(0,0,0,0)');

            const isCripto = asset.id === 'BTC';
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        borderColor: color,
                        backgroundColor: grad,
                        borderWidth: 2,
                        fill: true,
                        tension: 0.25,
                        pointRadius: 0,
                        pointHoverRadius: 4,
                        pointHoverBackgroundColor: color
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { intersect: false, mode: 'index' },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: (c) => c.parsed.y.toLocaleString('pt-BR', { style: 'currency', currency: isCripto ? 'USD' : 'BRL' })
                            }
                        }
                    },
                    scales: {
                        x: { ticks: { maxTicksLimit: 6, color: '#8E8E93', font: { size: 10 } }, grid: { display: false } },
                        y: {
                            position: 'right',
                            ticks: { color: '#8E8E93', font: { size: 10 }, maxTicksLimit: 5 },
                            grid: { color: 'rgba(128,128,128,0.1)' }
                        }
                    }
                }
            });
        }
    </script>
</body>
